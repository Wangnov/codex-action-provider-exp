name: Provider Search Test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve expected latest release tag
        id: expected
        shell: bash
        run: |
          tag="$(curl -fsSL https://api.github.com/repos/openai/codex-action/releases/latest | jq -r .tag_name)"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Run Codex against custom Responses endpoint
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.PROVIDER_API_KEY }}
          responses-api-endpoint: https://sub.jlypx.de/v1/responses
          model: gpt-5.4-mini
          sandbox: read-only
          codex-args: '["-c", "web_search=\"live\""]'
          prompt: |
            Search the web for the latest GitHub release tag of openai/codex-action.
            Reply with exactly the tag text and nothing else.

      - name: Assert final message
        shell: bash
        env:
          EXPECTED_TAG: ${{ steps.expected.outputs.tag }}
          FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          printf 'Final message: %s\n' "$FINAL_MESSAGE"
          printf 'Expected tag: %s\n' "$EXPECTED_TAG"
          test -n "$EXPECTED_TAG"
          test "$FINAL_MESSAGE" = "$EXPECTED_TAG"
